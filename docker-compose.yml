services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: dev-jobs-postgres
    environment:
      POSTGRES_USER: devjobs
      POSTGRES_PASSWORD: devjobs_local
      POSTGRES_DB: devjobs
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devjobs -d devjobs"]
      interval: 5s
      timeout: 3s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: dev-jobs-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  # 레이트리밋용 Redis. 백엔드는 app.ratelimit.redis=true + SPRING_DATA_REDIS_HOST 일 때만 사용한다
  # (기본은 인메모리라 이 컨테이너 없이도 동작). 운영 다중 인스턴스 대비 + 로컬에서 켜보고 싶을 때 사용.
  redis:
    image: redis:7-alpine
    container_name: dev-jobs-redis
    ports:
      - "6379:6379"

  # 번역 엔진 (셀프호스팅, 외부 API/키 불필요). 첫 기동 시 en/ko 모델 다운로드(수 분 소요 가능).
  # 모델은 컨테이너 내부에 저장 — docker start 로 재사용되고, 컨테이너 재생성(down/recreate) 시에만
  # 재다운로드. (named volume 은 root 소유 권한 충돌로 비루트 컨테이너가 쓰지 못해 제외.)
  libretranslate:
    image: libretranslate/libretranslate:latest
    container_name: dev-jobs-libretranslate
    environment:
      LT_LOAD_ONLY: "en,ko"
    ports:
      - "5050:5000"

volumes:
  postgres-data:
