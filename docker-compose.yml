services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: dev-jobs-postgres
    environment:
      POSTGRES_USER: devjobs
      POSTGRES_PASSWORD: devjobs_local
      POSTGRES_DB: devjobs
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devjobs -d devjobs"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres-data:
