spring:
  application:
    name: dev-jobs-backend

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/devjobs}
    username: ${DATABASE_USER:devjobs}
    password: ${DATABASE_PASSWORD:devjobs_local}
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_batch_fetch_size: 100
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null

  # Redis (app.ratelimit.redis=true 일 때만 사용). 빈은 항상 생성되지만 lazy 라 미사용 시 연결 안 함.
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:false}

  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID:dummy-client-id}
            client-secret: ${GITHUB_CLIENT_SECRET:dummy-client-secret}
            scope: read:user,user:email
          google:
            client-id: ${GOOGLE_CLIENT_ID:dummy-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:dummy-client-secret}
            scope: openid,email,profile

app:
  base-url: ${APP_BASE_URL:http://localhost:3000}
  mail-from: ${MAIL_FROM:no-reply@worlddeveloper.local}
  # 분석 요약(/api/v1/analytics/summary) 접근 허용 이메일(쉼표 구분). 미설정 시 아무도 못 봄.
  admin-emails: ${ADMIN_EMAILS:}
  ratelimit:
    # NL 추천 IP당 고정창 한도. 기본 10/시간(운영 LLM 비용 가드). 로컬 개발은 bootRun 이
    # NL_RATELIMIT_CAPACITY=100 으로 올린다(build.gradle). 운영은 jar 로 띄워 env 미설정 → 10 유지.
    nl-capacity: ${NL_RATELIMIT_CAPACITY:10}
    nl-window-ms: ${NL_RATELIMIT_WINDOW_MS:3600000}
    # 요약(AI 생성=캐시 미스) IP당 고정창 한도. 창은 nl-window-ms(1시간) 공유. 운영 기본 20/시간.
    summary-capacity: ${SUMMARY_RATELIMIT_CAPACITY:20}
    # true 면 RedisRateLimiter(다중 인스턴스 공유 + 재시작 보존), 아니면 인메모리(단일 인스턴스).
    # 운영 다중 인스턴스에서 true + spring.data.redis 설정. 로컬/CI 기본 false.
    redis: ${APP_RATELIMIT_REDIS:false}

auth:
  internal-secret: ${INTERNAL_AUTH_SECRET:dev-internal-secret-change-me}

ai:
  base-url: ${AI_BASE_URL:http://localhost:8001}

# 세션 JWT 서명 시크릿 (HS256, 최소 32바이트). web 미들웨어가 동일 시크릿으로 검증. 운영은 반드시 env 로 교체.
jwt:
  secret: ${JWT_SECRET:dev-local-jwt-secret-change-me-min-32-bytes!!}

server:
  port: ${PORT:8080}

logging:
  level:
    root: INFO
    com.devjobs: DEBUG
