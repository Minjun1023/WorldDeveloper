spring:
  application:
    name: dev-jobs-backend

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/devjobs}
    username: ${DATABASE_USER:devjobs}
    password: ${DATABASE_PASSWORD:devjobs_local}
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null

ai:
  base-url: ${AI_BASE_URL:http://localhost:8001}

# NextAuth 와 공유하는 JWT 서명 시크릿 (HS256, 최소 32바이트). 운영은 반드시 env 로 교체.
jwt:
  secret: ${JWT_SECRET:dev-local-jwt-secret-change-me-min-32-bytes!!}

server:
  port: ${PORT:8080}

logging:
  level:
    root: INFO
    com.devjobs: DEBUG
