name: Deploy

# main 에 push → CI(워크플로명 "CI") 가 성공하면 자동 배포.
# 러너가 체크아웃을 OCI 서버로 rsync 한 뒤 원격에서 docker compose 재빌드(= update.sh 와 동일 방식).
# SSH 에 ServerAliveInterval=30 → 긴 무출력 빌드(이미지 export 등)에서 연결이 broken pipe(exit 255)로
# 끊기지 않게 keepalive 를 보낸다. (이게 없어 ai 이미지 export 중 배포가 죽은 적 있음.)
# 수동 배포는 Actions 탭에서 "Run workflow"(workflow_dispatch).
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

# 배포는 한 번에 하나만. 진행 중인 배포는 죽이지 않고 큐잉.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    # CI 성공(workflow_run) 또는 수동(dispatch)에서만 실행.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # CI 가 검증한 바로 그 커밋을 배포(수동 실행 시엔 현재 HEAD).
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: SSH 키 준비
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: 소스 동기화 (rsync)
        # .env 제외 → 서버 deploy/.env(시크릿) 보존. postgres 볼륨은 건드리지 않음.
        run: |
          rsync -az --delete \
            --exclude '.git' --exclude 'node_modules' --exclude '.venv' \
            --exclude 'build' --exclude '.next' --exclude 'dist' --exclude '.gradle' \
            --exclude '__pycache__' --exclude '*.pyc' \
            --exclude '.env' --exclude '.DS_Store' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=10000" \
            ./ "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:~/WorldDeveloper/"

      # 빌드(수 분~수십 분)와 재시작을 분리 — 빌드 동안 기존 스택이 계속 서빙해
      # 다운타임을 '이미지 교체 + 백엔드 부팅' 수십 초로 줄인다. (기존엔 build 포함 up 한 방)
      - name: 이미지 선빌드 (docker compose build)
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=10000 \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "cd ~/WorldDeveloper/deploy && sudo docker compose -f docker-compose.prod.yml build"

      - name: 재기동 (docker compose up -d --remove-orphans)
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=10000 \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "cd ~/WorldDeveloper/deploy && sudo docker compose -f docker-compose.prod.yml up -d --remove-orphans"

      # /api/jobs/popular = Caddy→web→backend→postgres 전 체인 검증(백엔드 다운이면 BFF 가 502).
      # 여기서 실패하면 워크플로가 빨간불 — '배포 성공 = rsync 성공'이 아니라 '사이트가 실제로 뜸'을 보장.
      - name: 배포 후 스모크 체크
        run: |
          SITE="https://${{ secrets.DEPLOY_HOST }}.sslip.io"
          for i in $(seq 1 36); do
            code=$(curl -sk -o /dev/null -w '%{http_code}' --max-time 8 "$SITE/api/jobs/popular" || true)
            [ "$code" = "200" ] && break
            sleep 5
          done
          [ "$code" = "200" ] || { echo "백엔드 스모크 실패 (마지막 응답: $code)"; exit 1; }
          home=$(curl -sk -o /dev/null -w '%{http_code}' --max-time 10 "$SITE/" || true)
          [ "$home" = "200" ] || { echo "홈 응답 $home"; exit 1; }
          echo "스모크 통과: api 200 · 홈 200"

      - name: 상태 확인
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=10000 \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "sudo docker compose -f ~/WorldDeveloper/deploy/docker-compose.prod.yml ps --format 'table {{.Service}}\t{{.Status}}'"
